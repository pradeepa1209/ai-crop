<script>

function predictCrop(){

let n = document.getElementById("nitrogen").value;
let p = document.getElementById("phosphorus").value;
let k = document.getElementById("potassium").value;
let t = document.getElementById("temperature").value;
let h = document.getElementById("humidity").value;
let ph = document.getElementById("ph").value;
let r = document.getElementById("rainfall").value;

// ✅ VALIDATION
if(n==="" || p==="" || k==="" || t==="" || h==="" || ph==="" || r===""){
    document.getElementById("result").innerHTML = "❌ Please fill all fields!";
    return;
}

// Convert to numbers
n = parseFloat(n);
p = parseFloat(p);
k = parseFloat(k);
t = parseFloat(t);
h = parseFloat(h);
ph = parseFloat(ph);
r = parseFloat(r);

// ✅ SMART LOGIC (based on your dataset patterns)

let crop = "";

if(n > 80 && r > 200){
    crop = "Rice 🌾";
}
else if(n >= 50 && t >= 22 && t <= 28){
    crop = "Maize 🌽";
}
else if(p > 55){
    crop = "Chickpea 🌱";
}
else if(h > 80 && t > 28){
    crop = "Banana 🍌";
}
else if(t > 30 && h < 75){
    crop = "Watermelon 🍉";
}
else if(h > 85){
    crop = "Coconut 🥥";
}
else if(t < 22){
    crop = "Apple 🍎";
}
else if(n < 20){
    crop = "Orange 🍊";
}
else if(r > 150){
    crop = "Papaya 🍈";
}
else{
    crop = "Cotton 🌿";
}

// ✅ SHOW RESULT
document.getElementById("result").innerHTML = "🌱 Recommended Crop: " + crop;

}

</script>
