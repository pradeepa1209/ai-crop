<!DOCTYPE html>
<html>
<head>
<title>Crop Prediction</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="input-page">

<div class="form-box">

<h2>Enter Soil Details</h2>

<form action="/predict" method="POST">

<input type="number" name="N" placeholder="Nitrogen (N)" required>
<input type="number" name="P" placeholder="Phosphorus (P)" required>
<input type="number" name="K" placeholder="Potassium (K)" required>
<input type="number" name="temperature" placeholder="Temperature" required>
<input type="number" name="humidity" placeholder="Humidity" required>
<input type="number" name="ph" placeholder="pH value" required>
<input type="number" name="rainfall" placeholder="Rainfall" required>

<button type="submit">Predict Crop</button>

</form>

{% if result %}
<h3>🌱 Recommended Crop: {{ result }}</h3>
{% endif %}

</div>

</body>
</html>
